<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Santiago Mora — Wii Portfolio</title>
    <!--
      Single-page app redirect for GitHub Pages.
      When GitHub serves a 404 for any route (e.g. /about-me), this page
      encodes the path into the query string and redirects to index.html,
      where the companion script below reconstructs the original URL.
    -->
    <script>
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1)
            .join("/") +
          "/?p=/" +
          l.pathname
            .slice(1)
            .replace(/&/g, "~and~") +
          (l.search
            ? "&q=" + l.search.slice(1).replace(/&/g, "~and~")
            : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
